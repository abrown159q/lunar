<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appearance History Editor</title>

<link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
    rel="stylesheet"
>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
}

h1 {
    text-align: center;
}

.layout {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

.panel {
    background: white;
    border-radius: 8px;
    padding: 15px;
}

#calendar {
    min-height: 700px;
}

button {
    padding: 8px 15px;
    cursor: pointer;
    margin-right: 10px;
}

#appearanceList {
    max-height: 350px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
}

.dateRow {
    border-bottom: 1px solid #ddd;
    padding: 4px;
}

#statsTable {
    width: 100%;
    border-collapse: collapse;
}

#statsTable td {
    border-bottom: 1px solid #ddd;
    padding: 6px;
}

#debug {
    background: black;
    color: #00ff00;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    font-family: monospace;
    margin-top: 20px;
}

@media(max-width:1000px){

    .layout{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<h1>Appearance History Editor</h1>

<div class="layout">

    <div class="panel">

        <h2>Calendar</h2>

        <p>
            Click a day to add/remove an appearance.
        </p>

    <a href="index.html"><button>Back</button> </a>

        <div id="calendar"></div>

    </div>

    <div class="panel">

        <h2>Known Appearances</h2>

        <div id="appearanceList"></div>

        <br>

        <button id="saveBtn">
            Save
        </button>

        <button id="clearBtn">
            Clear
        </button>

        <hr>

        <h2>Statistics</h2>

        <table id="statsTable">

            <tr>
                <td>Count</td>
                <td id="statCount">0</td>
            </tr>

            <tr>
                <td>Intervals</td>
                <td id="statIntervals">0</td>
            </tr>

            <tr>
                <td>Mean</td>
                <td id="statMean">-</td>
            </tr>

            <tr>
                <td>Std Dev</td>
                <td id="statStd">-</td>
            </tr>

            <tr>
                <td>Minimum</td>
                <td id="statMin">-</td>
            </tr>

            <tr>
                <td>Maximum</td>
                <td id="statMax">-</td>
            </tr>

        </table>

    </div>

</div>

<div id="debug"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

const STORAGE_KEY =
    "historyAppearanceDates";

let appearanceDates = [];

let calendar = null;

function debug(...args){

    const msg =
        args.join(" ");

    console.log(msg);

    const div =
        document.getElementById(
            "debug"
        );

    div.innerHTML +=
        msg + "<br>";

    div.scrollTop =
        div.scrollHeight;
}

function saveDates(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(
            appearanceDates
        )
    );

    debug(
        "Saved",
        appearanceDates.length,
        "dates"
    );
}

function loadDates(){

    appearanceDates =
        JSON.parse(
            localStorage.getItem(
                STORAGE_KEY
            ) || "[]"
        );

    appearanceDates.sort();

    debug(
        "Loaded",
        appearanceDates.length,
        "dates"
    );
}

function getIntervals(){

    const intervals = [];

    for(
        let i = 1;
        i < appearanceDates.length;
        i++
    ){

        const d1 =
            new Date(
                appearanceDates[i-1]
            );

        const d2 =
            new Date(
                appearanceDates[i]
            );

        intervals.push(
            (
                d2 - d1
            ) / 86400000
        );
    }

    return intervals;
}

function mean(arr){

    if(arr.length === 0)
        return null;

    return arr.reduce(
        (a,b)=>a+b,
        0
    ) / arr.length;
}

function stdDev(arr){

    if(arr.length < 2)
        return null;

    const m =
        mean(arr);

    const variance =
        arr.reduce(
            (sum,x)=>
            sum +
            Math.pow(
                x-m,
                2
            ),
            0
        ) / arr.length;

    return Math.sqrt(
        variance
    );
}

function updateStatistics(){

    const intervals =
        getIntervals();

    document.getElementById(
        "statCount"
    ).textContent =
        appearanceDates.length;

    document.getElementById(
        "statIntervals"
    ).textContent =
        intervals.length;

    document.getElementById(
        "statMean"
    ).textContent =
        intervals.length
        ? mean(intervals).toFixed(2)
        : "-";

    document.getElementById(
        "statStd"
    ).textContent =
        intervals.length > 1
        ? stdDev(intervals).toFixed(2)
        : "-";

    document.getElementById(
        "statMin"
    ).textContent =
        intervals.length
        ? Math.min(
            ...intervals
        )
        : "-";

    document.getElementById(
        "statMax"
    ).textContent =
        intervals.length
        ? Math.max(
            ...intervals
        )
        : "-";
}

function updateList(){

    const div =
        document.getElementById(
            "appearanceList"
        );

    div.innerHTML = "";

    appearanceDates.forEach(
        date => {

            const row =
                document.createElement(
                    "div"
                );

            row.className =
                "dateRow";

            row.textContent =
                date;

            div.appendChild(
                row
            );
        }
    );
}

function updateCalendarEvents(){

    calendar.removeAllEvents();

    appearanceDates.forEach(
        date => {

            calendar.addEvent({

                start: date,

                title: "Observed",

                backgroundColor:
                    "#00aa00",

                borderColor:
                    "#006600"
            });
        }
    );
}

function refreshUI(){

    updateList();

    updateStatistics();

    updateCalendarEvents();
}

function toggleDate(
    dateStr
){

    const idx =
        appearanceDates.indexOf(
            dateStr
        );

    if(idx >= 0){

        appearanceDates.splice(
            idx,
            1
        );

        debug(
            "Removed",
            dateStr
        );
    }
    else{

        appearanceDates.push(
            dateStr
        );

        appearanceDates.sort();

        debug(
            "Added",
            dateStr
        );
    }
    saveDates();
    refreshUI();
}

function initializeCalendar(){

    calendar =
        new FullCalendar.Calendar(

            document.getElementById(
                "calendar"
            ),

            {

                initialView:
                    "dayGridMonth",

                height: 700,

                dateClick:
                    function(info){

                        toggleDate(
                            info.dateStr
                        );
                    }
            }
        );

    calendar.render();

    debug(
        "Calendar initialized"
    );
}

document.addEventListener(
    "DOMContentLoaded",
    ()=>{

        initializeCalendar();

        loadDates();

        refreshUI();

        document
        .getElementById(
            "saveBtn"
        )
        .addEventListener(
            "click",
            saveDates
        );

        document
        .getElementById(
            "clearBtn"
        )
        .addEventListener(
            "click",
            ()=>{

                if(
                    !confirm(
                        "Clear all dates?"
                    )
                ){
                    return;
                }

                appearanceDates = [];

                saveDates();

                refreshUI();

                debug(
                    "Cleared all dates"
                );
            }
        );

        debug(
            "History editor ready"
        );
    }
);

</script>

</body>
</html>
