<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Celestial Arrival Predictor</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>

<body>

<header>
    <h1>Celestial Arrival Predictor</h1>
</header>

<section class="controls">

    <label>
        Last Arrival
        <input type="date" id="lastDate">
    </label>

    <label>
        Min Cycle
        <input type="number" id="minGap" value="26">
    </label>

    <label>
        Max Cycle
        <input type="number" id="maxGap" value="30">
    </label>

    <button id="runBtn">
        Calculate
    </button>

    <button id="clearBtn">
        Clear Storage
    </button>

</section>

<div class="layout">

    <div class="leftPanel">

        <div id="calendar"></div>

        <canvas id="probabilityChart"></canvas>

    </div>

    <div class="rightPanel">

        <h2>Highest Probability Dates</h2>

        <div id="topDates"></div>

        <h2>Debug Console</h2>

        <pre id="debugConsole"></pre>

    </div>

</div>

<script src="js/debug.js"></script>
<script src="js/storage.js"></script>
<script src="js/probabilityEngine.js"></script>
<script src="js/calendarView.js"></script>
<script src="js/chartView.js"></script>
<script src="js/app.js"></script>

</body>
</html>
